<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - EcoBudget</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="index.html" class="logo">🌱 EcoBudget</a>
            <ul class="nav-menu">
                <li><a href="index.html">🏠 Home</a></li>
                <li><a href="dashboard.html">📊 Dashboard</a></li>
                <li><a href="add-expense.html">➕ Add Expense</a></li>
                <li><a href="reports.html">📈 Reports</a></li>
                <li><a href="profile.html">👤 Profile</a></li>
                <li><a href="register.html">📝 Register</a></li>
            </ul>
            <div class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <main class="main-content">
        <div class="container">
            <div class="form-container">
                <h2 style="text-align: center; color: #388E3C; margin-bottom: 2rem;">🔐 Login to EcoBudget</h2>
                <form action="#" method="post">
                    <div class="form-group">
                        <label for="email">📧 Email</label>
                        <input type="email" id="email" name="email" required placeholder="Enter your email">
                    </div>
                    <div class="form-group">
                        <label for="password">🔒 Password</label>
                        <input type="password" id="password" name="password" required placeholder="Enter your password">
                    </div>
                    <button type="submit" class="btn">🚀 Login</button>
                </form>
                <div class="form-footer">
                    <p>Don't have an account? <a href="register.html">📝 Register here</a> 🌟</p>
                </div>
            </div>
        </div>
    </main>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2026 EcoBudget. Made with 💚 for a sustainable future.</p>
            <div class="footer-links">
                <a href="about.html">ℹ️ About</a> |
                <a href="contact.html">📞 Contact</a> |
                <a href="#">🔒 Privacy</a>
            </div>
        </div>
    </footer>

    <script>
        // Simple hamburger menu toggle (for mobile)
        const hamburger = document.querySelector('.hamburger');
        const navMenu = document.querySelector('.nav-menu');

        hamburger.addEventListener('click', () => {
            navMenu.classList.toggle('active');
        });
    </script>
</body>
</html>
